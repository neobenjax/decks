<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architecture of Intentionality - Style A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,900;1,6..96,900&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* Base styles matching viewport-base.css */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #0F1A5C; /* Dark navy stage fallback */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewport {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: #3CD896; /* Emerald Green */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 90px;
            box-sizing: border-box;
        }

        /* Emerald Editorial Styles */
        :root {
            --emerald: #3CD896;
            --navy: #0F1A5C;
            --oat-paper: #F1E9D6;
        }

        /* Double-rule ornament */
        .ornament {
            border-top: 4px solid var(--navy);
            border-bottom: 4px solid var(--navy);
            padding: 10px 0;
            display: inline-block;
            margin-bottom: 40px;
            align-self: flex-start;
        }

        .ornament span {
            font-family: 'Bodoni Moda', serif;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--navy);
            font-weight: 900;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            max-width: 1400px;
        }

        .title-display {
            font-family: 'Bodoni Moda', serif;
            font-size: 110px;
            line-height: 1.05;
            color: var(--navy);
            font-weight: 900;
            margin: 0 0 40px 0;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .subtitle {
            font-family: 'Manrope', sans-serif;
            font-size: 32px;
            line-height: 1.5;
            color: var(--navy);
            font-weight: 500;
            max-width: 900px;
            margin: 0;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 4px solid var(--navy);
            padding-top: 30px;
            width: 100%;
        }

        .footer-left {
            font-family: 'Manrope', sans-serif;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--navy);
        }

        .footer-right {
            font-family: 'Manrope', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: var(--navy);
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="viewport" id="stage">
        <div class="ornament">
            <span>Masterclass Series</span>
        </div>
        
        <div class="content-container">
            <h1 class="title-display">The Architecture<br>of Intentionality</h1>
            <p class="subtitle">Constructing your pathway to well-being and career success in Canada.</p>
        </div>

        <div class="footer">
            <span class="footer-left">Session 01</span>
            <span class="footer-right">International Post-Graduate Planning</span>
        </div>
    </div>

    <script>
        function scaleStage() {
            const stage = document.getElementById('stage');
            const targetW = 1920;
            const targetH = 1080;
            const windowW = window.innerWidth;
            const windowH = window.innerHeight;
            const scaleX = windowW / targetW;
            const scaleY = windowH / targetH;
            const scale = Math.min(scaleX, scaleY);
            
            stage.style.transform = `scale(${scale})`;
            stage.style.position = 'absolute';
            stage.style.left = `${(windowW - targetW * scale) / 2}px`;
            stage.style.top = `${(windowH - targetH * scale) / 2}px`;
            stage.style.transformOrigin = '0 0';
        }
        
        window.addEventListener('resize', scaleStage);
        scaleStage();
    </script>
</body>
</html>
