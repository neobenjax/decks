<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presentation Remote</title>
    <style>
        :root {
            --dark-void: #0A0E27;
            --deep-navy: #0F1B3D;
            --neon-cyan: #5EDCF4;
            --neon-pink: #F0A6CA;
            --soft-lavender: #E2D5F2;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-void);
            background-image: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(10, 14, 39, 0.5) 2px, rgba(10, 14, 39, 0.5) 4px);
            color: var(--soft-lavender);
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(15, 27, 61, 0.8);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 4px 15px rgba(94, 220, 244, 0.2);
            backdrop-filter: blur(10px);
        }
        .title {
            margin: 0;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #status {
            margin-top: 5px;
            font-size: 0.9rem;
            color: var(--neon-pink);
        }
        #slide-info {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }
        .btn {
            flex: 1;
            border: 2px solid;
            border-radius: 16px;
            background: rgba(15, 27, 61, 0.5);
            color: #fff;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-prev {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(240, 166, 202, 0.2);
        }
        .btn-prev:active {
            background: rgba(240, 166, 202, 0.2);
        }
        .btn-next {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(94, 220, 244, 0.2);
        }
        .btn-next:active {
            background: rgba(94, 220, 244, 0.2);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">Remote</h1>
        <div id="status">Connecting...</div>
        <div id="slide-info">Slide --</div>
    </div>

    <div class="controls">
        <button class="btn btn-prev" id="btn-prev">Previous</button>
        <button class="btn btn-next" id="btn-next">Next</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const slideInfoEl = document.getElementById('slide-info');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        // Extract session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const hostId = urlParams.get('id');

        if (!hostId) {
            statusEl.innerText = "Error: No Session ID found in URL";
            statusEl.style.color = "red";
        } else {
            const peer = new Peer();
            let conn = null;

            peer.on('open', (id) => {
                statusEl.innerText = "Connecting to Host...";
                
                // Connect to host
                conn = peer.connect(hostId, {
                    reliable: true
                });

                conn.on('open', () => {
                    statusEl.innerText = "Connected";
                    statusEl.style.color = "#5EDCF4"; // neon-cyan
                });

                conn.on('data', (data) => {
                    if (data && data.type === 'state') {
                        const current = data.current;
                        const total = data.total;
                        const left = total - current;
                        
                        if (left > 0) {
                            slideInfoEl.innerText = \`Slide \${current} — \${left} left\`;
                        } else {
                            slideInfoEl.innerText = \`Slide \${current} — End of deck\`;
                        }
                    }
                });

                conn.on('close', () => {
                    statusEl.innerText = "Disconnected";
                    statusEl.style.color = "red";
                    slideInfoEl.innerText = "Slide --";
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                statusEl.innerText = "Connection Error";
                statusEl.style.color = "red";
            });

            // Button controls
            const sendCommand = (cmd) => {
                if (conn && conn.open) {
                    conn.send({ command: cmd });
                }
            };

            btnPrev.addEventListener('click', () => {
                sendCommand('prev');
                // Haptic feedback if supported
                if (navigator.vibrate) navigator.vibrate(50);
            });

            btnNext.addEventListener('click', () => {
                sendCommand('next');
                // Haptic feedback if supported
                if (navigator.vibrate) navigator.vibrate(50);
            });
        }
    </script>
</body>
</html>
